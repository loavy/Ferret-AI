<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ferret AI</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="/static/img/icon.jpg">
</head>

<body>
  <header class="top-bar">
    <div class="brand">
      <img src="/static/img/icon.jpg" alt="">
      <div>
        <strong>Ferret AI</strong>
        <span>Local assistant - {{ model }}</span>
      </div>
    </div>
    <div class="header-actions">
      <span id="status" class="status">Checking...</span>
      <button id="sidebar-toggle" class="icon-button" type="button" title="Toggle conversations" aria-label="Toggle conversations" aria-expanded="true">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 5h16M4 12h10M4 19h16"></path>
        </svg>
      </button>
      <button id="clear-button" class="icon-button" type="button" title="New chat" aria-label="New chat">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5v14M5 12h14"></path>
        </svg>
      </button>
      <button id="theme-button" class="icon-button" type="button" title="Toggle theme" aria-label="Toggle theme">
        <svg id="moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8Z"></path>
        </svg>
        <svg id="sun" viewBox="0 0 24 24" aria-hidden="true" hidden>
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="app-shell">
    <aside class="conversation-panel">
      <div class="panel-actions">
        <button id="new-conversation-button" class="panel-button" type="button">New chat</button>
        <button id="import-button" class="panel-button secondary" type="button">Import log</button>
        <input id="log-import-input" type="file" accept=".txt,.log,text/plain" hidden>
      </div>
      <div id="drop-zone" class="drop-zone">
        <strong>Drop a Ferret log</strong>
        <span>Terminal or web logs become a chat you can continue.</span>
      </div>
      <div class="conversation-heading">Conversations</div>
      <div id="conversation-list" class="conversation-list" aria-label="Conversations"></div>
    </aside>

    <section class="chat-shell">
      <section id="messages" aria-live="polite">
        <div class="welcome">
          <div class="welcome-mark">Ferret</div>
          <h1>What should we think through?</h1>
          <p>Ask for code, writing, planning, explanations, debugging, translation, or a second opinion.</p>
          <div class="quick-actions" aria-label="Prompt shortcuts">
            <button type="button" data-prompt="Help me think through this:\n\n">Think</button>
            <button type="button" data-prompt="Make this clearer and better written:\n\n">Write</button>
            <button type="button" data-prompt="Help me debug this:\n\n">Debug</button>
            <button type="button" data-prompt="Give me a small practical plan for:\n\n">Plan</button>
          </div>
        </div>
      </section>

      <form id="composer" class="input-area">
        <textarea id="messageInput" rows="1" placeholder="Message Ferret..."></textarea>
        <button id="send-button" class="send-button" type="submit" title="Send" aria-label="Send">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m22 2-7 20-4-9-9-4Z"></path>
            <path d="M22 2 11 13"></path>
          </svg>
        </button>
      </form>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>

</html>
